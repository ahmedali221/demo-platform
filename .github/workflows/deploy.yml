name: Build & Deploy Frontend to Production

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  # ─── Job 1: Build Docker image and push to GHCR ────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        id: image_name
        run: echo "value=$(echo 'ghcr.io/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_name.outputs.value }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASEURL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 2: Deploy to server via SSH ───────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_TOKEN,GITHUB_ACTOR,GITHUB_REPOSITORY
          script: |
            set -e

            APP_DIR="/opt/ops-frontend"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # ── 1. Clone or pull latest code ─────────────────────────────────
            if [ ! -d ".git" ]; then
              git clone https://${GITHUB_ACTOR}:${GHCR_TOKEN}@github.com/${GITHUB_REPOSITORY}.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            # ── 2. Write .env ─────────────────────────────────────────────────
            REPO_LOWER=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
            cat > "$APP_DIR/.env" <<EOF
            GHCR_IMAGE=ghcr.io/${REPO_LOWER}:latest
            EOF

            # ── 3. Login to GHCR and pull latest image ────────────────────────
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            docker pull ghcr.io/${REPO_LOWER}:latest

            # ── 4. Restart container ──────────────────────────────────────────
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --no-build --remove-orphans

            # ── 5. Health check (Internal) ────────────────────────────────────
            echo "Waiting for container to be ready..."
            MAX_RETRIES=12
            COUNT=0
            while [ $COUNT -lt $MAX_RETRIES ]; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
              if [ "$STATUS" == "200" ]; then
                echo "Health check passed (HTTP 200)"
                break
              fi
              echo "Attempt $((COUNT+1))/$MAX_RETRIES: Frontend not ready yet (HTTP $STATUS). Waiting 5s..."
              sleep 5
              COUNT=$((COUNT+1))
            done

            if [ $COUNT -eq $MAX_RETRIES ]; then
              echo "Health check failed after $MAX_RETRIES attempts"
              docker compose logs frontend
              exit 1
            fi

            # ── 6. Cleanup ────────────────────────────────────────────────────
            docker image prune -f

            echo "Frontend deployed — $(date -u)"

        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}

